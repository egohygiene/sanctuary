---
# Documentation: https://pre-commit.com/
# Reference: https://gatlenculp.github.io/gatlens-opinionated-template/precommit/
exclude: |
  (?x)^(
    \.history/.*|
    .*\.cache.*/.*|
    .*venv.*/.*|
    node_modules/.*|
    reports/.*
  )$
default_language_version:
  python: python3.12
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  # ---------------------------------------------------------------------------- #
  #                              🔒 Security Tools                               #
  # ---------------------------------------------------------------------------- #

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: "🔒 security · Detect hardcoded secrets"

  # ---------------------------------------------------------------------------- #
  #                          📁 Filesystem & Git Checks                          #
  # ---------------------------------------------------------------------------- #

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Filesystem Checks
      - id: check-executables-have-shebangs
        name: "📁 filesystem · Verify shebang presence"
      - id: check-shebang-scripts-are-executable
        name: "📁 filesystem · Verify script permissions"
      - id: check-case-conflict
        name: "📁 filesystem · Check case sensitivity conflicts"
      - id: check-illegal-windows-names
        name: "📁 filesystem · Validate Windows filenames"
      - id: check-symlinks
        name: "📁 filesystem · Check symlink validity"
      - id: destroyed-symlinks
        name: "📁 filesystem · Detect broken symlinks"
      # Git Checks
      - id: check-merge-conflict
        name: "🌳 git · Detect conflict markers"
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"
      - id: check-added-large-files
        name: "🌳 git · Block large file commits"
        args: ["--maxkb=5000"]
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: ["--branch", "main", "--branch", "master"]

  # ---------------------------------------------------------------------------- #
  #                            🔍 Code Quality Tools                             #
  # ---------------------------------------------------------------------------- #

  ### Python ###
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        name: "🐍 python · Format with Ruff"
      - id: ruff
        name: "🐍 python · Lint and auto-fix with Ruff"
        args: [--fix]

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff-format
        name: "📓 notebook · Format notebooks with Ruff"
      - id: nbqa-ruff
        name: "📓 notebook · Lint and auto-fix notebooks with Ruff"
        args: [--fix]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        name: "🐍 python · Validate pyproject.toml"
        additional_dependencies: ["validate-pyproject-schema-store[all]"]

  ### JavaScript & TypeScript ###
  - repo: https://github.com/biomejs/pre-commit
    rev: "v0.6.1"
    hooks:
      - id: biome-check
        name: "🟨 javascript · Lint, format, and safe fixes with Biome"
        additional_dependencies: ["@biomejs/biome@2.4.10"]

  ### Markdown ###
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: "📝 markdown · Format with mdformat"

  ### Shell ###
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: "🐚 shell · Lint shell scripts"

  ### Data & Config Validation ###
  - repo: https://github.com/openstack/bashate
    rev: 2.1.1
    hooks:
      - id: bashate
        args: ["--ignore", "E006"]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows
        name: "🐙 github-actions · Validate GitHub workflow files"
      - id: check-github-actions
        name: "🐙 github-actions · Validate GitHub action files"
      - id: check-taskfile
        name: "✅ taskfile · Validate Task configuration"

  ### Spelling ###
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: "✏️ spelling · Check for misspellings with codespell"
        additional_dependencies:
          - tomli

  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos
        name: "✏️ spelling · Check for typos with typos"

  ### License ###
  - repo: https://github.com/google/addlicense
    rev: v1.1.1
    hooks:
      - id: addlicense
        name: "📄 license · Check and add license headers"
        args: ["-c", "Ego Hygiene", "-l", "mit", "-ignore", "**/*.json", "-ignore", "**/*.yml", "-ignore", "**/*.yaml", "-ignore", "**/*.toml", "-ignore", "**/*.md", "-ignore", "**/*.txt", "-ignore", "reports/**"]

  ### MegaLinter ###
  - repo: https://github.com/oxsecurity/megalinter
    rev: v8
    hooks:
      # Runs MegaLinter on changed files only (skips linters that run in project mode)
      - id: megalinter-incremental
        stages:
          - pre-commit
      # Runs full MegaLinter scan (all files)
      # - id: megalinter-full
      #   stages:
      #     - pre-push

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
        name: "📄 license · Validate REUSE compliance"
