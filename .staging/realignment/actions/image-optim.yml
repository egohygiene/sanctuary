# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: 🖼️ Image Optimisation

######################################################################
# Image optimisation via image_optim
#
# Runs image_optim against all PNG, JPEG, GIF and SVG files tracked
# in the repository, commits the losslessly optimised versions back
# to the branch, and opens a pull request (or pushes directly when
# running on the default branch).
#
# This workflow is intentionally DISABLED by default — it has no
# automatic triggers and must be invoked manually via
# workflow_dispatch or re-enabled by adding push/pull_request
# triggers when you are ready to run it in CI.
#
# Tools used:
#   - image_optim gem   — orchestrates all binary workers
#   - advpng            — lossless PNG compression (advancecomp)
#   - gifsicle          — GIF optimisation
#   - jhead             — JPEG metadata stripping
#   - jpegtran          — lossless JPEG transforms (libjpeg-turbo)
#   - jpegoptim         — JPEG optimisation
#   - optipng           — PNG optimisation
#   - pngcrush          — PNG compression
#   - pngquant          — lossy PNG quantisation
#   - oxipng            — Rust-based PNG optimiser
#   - svgo              — SVG optimisation (npm)
#
# References:
#   - https://github.com/toy/image_optim
######################################################################

# Disabled: only manually triggered
on:
  workflow_dispatch:
    inputs:
      paths:
        description: "Space-separated list of paths to optimise (default: assets public)"
        required: false
        default: "assets public"
      dry_run:
        description: "Dry run — report savings without writing changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions: {}

jobs:
  # --------------------------------------------------------------------------
  # optimise — install image_optim, run it against tracked images, and
  #            commit/PR the results back to the repository
  # --------------------------------------------------------------------------
  optimise:
    name: 🖼️ Optimise Images
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------
      # Ruby — needed for the image_optim gem
      # ----------------------------------------------------------------
      - name: 💎 Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      # ----------------------------------------------------------------
      # Binary helpers that image_optim delegates to
      # ----------------------------------------------------------------
      - name: 📦 Install binary optimiser dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install --yes --no-install-recommends \
            advancecomp \
            gifsicle \
            jhead \
            jpegoptim \
            libjpeg-turbo-progs \
            optipng \
            pngcrush \
            pngquant

      # ----------------------------------------------------------------
      # oxipng — Rust-based PNG optimiser (pre-built binary from releases)
      # ----------------------------------------------------------------
      - name: 🦀 Install oxipng
        run: |
          OXIPNG_VERSION="$(curl -fsSL https://api.github.com/repos/shssoichiro/oxipng/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')"
          curl -fsSL \
            "https://github.com/shssoichiro/oxipng/releases/download/v${OXIPNG_VERSION}/oxipng-${OXIPNG_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin oxipng-${OXIPNG_VERSION}-x86_64-unknown-linux-musl/oxipng
          chmod +x /usr/local/bin/oxipng
          oxipng --version

      # ----------------------------------------------------------------
      # svgo — SVG optimiser via npm
      # ----------------------------------------------------------------
      - name: 🟢 Install svgo
        run: npm install --global svgo

      # ----------------------------------------------------------------
      # image_optim gem
      # ----------------------------------------------------------------
      - name: 💎 Install image_optim gem
        run: gem install --no-document image_optim

      # ----------------------------------------------------------------
      # Run image_optim
      # ----------------------------------------------------------------
      - name: 🖼️ Optimise images
        id: optimise
        run: |
          PATHS="${{ inputs.paths }}"
          DRY_RUN="${{ inputs.dry_run }}"

          # Collect all tracked image files under the requested paths
          mapfile -t IMAGE_FILES < <(
            git ls-files -- ${PATHS} \
              | grep -iE '\.(png|jpg|jpeg|gif|svg)$' \
              || true
          )

          if [[ ${#IMAGE_FILES[@]} -eq 0 ]]; then
            echo "No image files found under: ${PATHS}"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Found ${#IMAGE_FILES[@]} image file(s) to process."

          if [[ "${DRY_RUN}" == "true" ]]; then
            image_optim --no-pngout --info "${IMAGE_FILES[@]}"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            EXIT_CODE=0
            image_optim --no-pngout "${IMAGE_FILES[@]}" || EXIT_CODE=$?
            if [[ ${EXIT_CODE} -ne 0 ]]; then
              echo "::warning::image_optim exited with code ${EXIT_CODE}; some files may not have been optimised."
            fi
            # Check whether any files were actually modified
            if git diff --quiet; then
              echo "No changes after optimisation."
              echo "changed=false" >> "${GITHUB_OUTPUT}"
            else
              echo "changed=true" >> "${GITHUB_OUTPUT}"
            fi
          fi

      # ----------------------------------------------------------------
      # Commit optimised images back to the branch
      # ----------------------------------------------------------------
      - name: 📝 Commit optimised images
        if: steps.optimise.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore: optimise images with image_optim [skip ci]"
          git push
