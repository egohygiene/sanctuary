# appearance
image-display-duration=inf

# Play video with no window border and decorations.
# no-border

# Prepend module name to each console message.
msg-module

# Look for a file-specific configuration file in the same directory.
# use-filedir-conf

no-osc
osd-level=1

# If the media is not seekable, force to enable seeking with cache.
force-seekable='yes'

# Cursor is always visible in windowed mode.
cursor-autohide-fs-only

# Disable media keys support.
input-media-keys='no'

# Enable printing a progress bar under the status line on the terminal.
term-osd-bar

# Customize the `term-osd-bar` feature.
term-osd-bar-chars='[━━ ]'


# Set the image file type used for saving screenshots.
screenshot-format='png'
screenshot-png-compression=8

# Specify the filename template used to save screenshots.
# screenshot-template='~/Desktop/%02n %p'

# Custom subtitle font settings.
sub-ass-override='force'
sub-font='Helvetica'
sub-bold='no'
sub-font-size=40
sub-border-size=2
sub-pos=95
sid=1
slang=en
vlang=en

# video
profile=gpu-hq
hwdec=auto

# ytdl
ytdl-format=bestvideo[height<=?1080]+bestaudio[ext=m4a]/best[height<=?1080]

# extension specific settings
[extension.gifv]
loop-file=yes

[extension.gif]
loop-file=yes

# script=/usr/share/mpv/scripts/mpris.so
