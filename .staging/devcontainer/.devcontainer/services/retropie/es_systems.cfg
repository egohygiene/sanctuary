<?xml version="1.0"?>
<!--
  EmulationStation minimal system configuration.

  This is a stub es_systems.cfg that allows EmulationStation to start
  inside the container without crashing.  It declares a small set of
  common systems.  Add or remove <system> entries as needed, or replace
  this file entirely with a fuller configuration once emulators are
  installed via RetroPie-Setup.

  Reference: https://retropie.org.uk/docs/EmulationStation/
-->
<systemList>
  <!-- Super Nintendo Entertainment System -->
  <system>
    <name>snes</name>
    <fullname>Super Nintendo Entertainment System</fullname>
    <path>/home/pi/RetroPie/roms/snes</path>
    <extension>.smc .sfc .fig .swc .mgd .SMC .SFC .FIG .SWC .MGD .zip .ZIP .7z .7Z</extension>
    <command>emulatorlauncher %SYSTEM% %ROM%</command>
    <platform>snes</platform>
    <theme>snes</theme>
  </system>

  <!-- Nintendo Entertainment System -->
  <system>
    <name>nes</name>
    <fullname>Nintendo Entertainment System</fullname>
    <path>/home/pi/RetroPie/roms/nes</path>
    <extension>.nes .NES .zip .ZIP .7z .7Z</extension>
    <command>emulatorlauncher %SYSTEM% %ROM%</command>
    <platform>nes</platform>
    <theme>nes</theme>
  </system>

  <!-- Game Boy Advance -->
  <system>
    <name>gba</name>
    <fullname>Game Boy Advance</fullname>
    <path>/home/pi/RetroPie/roms/gba</path>
    <extension>.gba .GBA .zip .ZIP .7z .7Z</extension>
    <command>emulatorlauncher %SYSTEM% %ROM%</command>
    <platform>gba</platform>
    <theme>gba</theme>
  </system>

  <!-- Sega Genesis / Mega Drive -->
  <system>
    <name>megadrive</name>
    <fullname>Sega Mega Drive / Genesis</fullname>
    <path>/home/pi/RetroPie/roms/megadrive</path>
    <extension>.bin .gen .md .sg .smd .BIN .GEN .MD .SG .SMD .zip .ZIP .7z .7Z</extension>
    <command>emulatorlauncher %SYSTEM% %ROM%</command>
    <platform>megadrive,genesis</platform>
    <theme>megadrive</theme>
  </system>
</systemList>
