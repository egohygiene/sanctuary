---
# yaml-language-server: $schema=https://json.schemastore.org/github-issue-config.json

# -----------------------------------------------------------------------------
# GitHub Issue Configuration
# -----------------------------------------------------------------------------
#
# Purpose:
#   Define repository issue creation behavior and contributor guidance.
#
# Design Goals:
#   - encourage structured issue creation
#   - reduce untracked work
#   - route contributors to the appropriate workflow
#   - support spec-driven development
#
# Reference:
#   https://docs.github.com/issues/tracking-your-work-with-issues
#
# -----------------------------------------------------------------------------

# Require contributors to use issue forms.
blank_issues_enabled: false

contact_links:
  - name: 💬 Questions & Discussions
    url: https://github.com/egohygiene/sanctuary/discussions
    about: Ask questions, share ideas, and discuss potential improvements.

  - name: 🧠 Research & Exploration
    url: https://github.com/egohygiene/sanctuary/discussions/categories/ideas
    about: Explore concepts, architectural ideas, and future directions before creating implementation work.

  - name: 📚 Documentation Feedback
    url: https://github.com/egohygiene/sanctuary/discussions/categories/documentation
    about: Suggest documentation improvements, onboarding enhancements, or clarification requests.

  - name: 🔒 Security Reports
    url: https://github.com/egohygiene/sanctuary/security/advisories/new
    about: Report security vulnerabilities privately and responsibly.
