---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "🔍 Dependency Review"

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "🔍 Review Dependencies"
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v6

      - name: "🔍 Dependency Review"
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          retry-on-snapshot-warnings: true
          warn-only: false
          deny-licenses: >-
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later

      - name: "📊 Write Summary"
        if: always()
        run: |
          {
            printf "## 🔍 Dependency Review Summary\n\n"
            printf "Dependency review completed.\n\n"
            printf "This workflow checks pull request dependency changes for:\n\n"
            printf "- 🔒 Known vulnerabilities\n"
            printf "- 📜 Denied licenses\n"
            printf "- ⚠️ Risky dependency changes\n\n"
            printf "### Blocking Policy\n\n"
            printf "- Critical vulnerabilities block merge.\n"
            printf "- High vulnerabilities block merge.\n"
            printf "- Denied licenses block merge.\n\n"
            printf "See the Dependency Review step for detailed findings.\n"
          } >> "${GITHUB_STEP_SUMMARY}"
