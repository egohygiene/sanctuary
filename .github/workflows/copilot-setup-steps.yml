---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "🤖 Copilot Setup Steps"

on:
  workflow_dispatch:

  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "docs/copilot/COPILOT_ALLOWLIST.md"

  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "docs/copilot/COPILOT_ALLOWLIST.md"

permissions: {}

jobs:
  # Must be named exactly "copilot-setup-steps"
  copilot-setup-steps:
    name: "🤖 Prepare Copilot Environment"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: "📦 Checkout repository"
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: "🐙 Verify GitHub CLI"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth status

      - name: "🏷️ Fetch tags and history"
        run: |
          git fetch --unshallow || true
          git fetch --tags

      - name: "🧰 Install baseline tools"
        run: |
          sudo apt-get update

          sudo apt-get install \
            --yes \
            jq \
            curl \
            git \
            make \
            shellcheck

      - name: "📦 Verify package tooling"
        run: |
          node --version || true
          npm --version || true
          python3 --version || true
          pip3 --version || true
          jq --version
          shellcheck --version

      - name: "🔍 Environment diagnostics"
        run: |
          printf "Repository: %s\n" "${GITHUB_REPOSITORY}"
          printf "Ref: %s\n" "${GITHUB_REF}"
          printf "Actor: %s\n" "${GITHUB_ACTOR}"

          printf "\nGit Version\n"
          git --version

          printf "\nGitHub CLI Version\n"
          gh --version

          printf "\nOperating System\n"
          uname --all

      - name: "📚 Repository-specific setup"
        run: |
          printf "%s\n" \
            "Add repository-specific dependency installation here."
