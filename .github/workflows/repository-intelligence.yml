---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "🧠 Repository Intelligence"

on:
  workflow_dispatch:

  push:
    branches:
      - "main"
      - "master"
    paths-ignore:
      - "docs/generated/**"

permissions:
  contents: write

concurrency:
  group: "repository-intelligence-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  generate:
    name: "🧠 Generate Repository Intelligence"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🧠 Generate Intelligence Artifacts"
        uses: ./.github/actions/generate-repository-intelligence

      - name: "💾 Commit Generated Artifacts"
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/generated

          if git diff --cached --quiet; then
            printf "No repository intelligence changes detected.\n"
            exit 0
          fi

          git commit --message "docs: refresh repository intelligence"
          git push
