---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "🔒 CodeQL"

# =============================================================================
# CodeQL Security Analysis
# =============================================================================
#
# Purpose:
#   Perform static application security testing (SAST) using GitHub CodeQL.
#
# Notes:
#   - Integrates with GitHub Security and Code Scanning.
#   - Automatically detects supported languages.
#   - Helps identify security vulnerabilities and code quality issues.
#   - Complements Dependency Review and Gitleaks.
#
# References:
#   - https://codeql.github.com/
#   - https://docs.github.com/en/code-security/code-scanning
#
# =============================================================================

on:
  push:
    branches:
      - main
      - master

  pull_request:

  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "🔒 Analyze"

    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false

      matrix:
        language:
          - actions
          - javascript-typescript
          - python

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: "🔒 Initialize CodeQL"
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: "🏗️ Autobuild"
        uses: github/codeql-action/autobuild@v4

      - name: "🔍 Perform Analysis"
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"