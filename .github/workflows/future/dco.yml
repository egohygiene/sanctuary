---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# =============================================================================
# DCO Enforcement
# =============================================================================
#
# Status:
#   Future Governance Enhancement
#
# Purpose:
#   Enforce Developer Certificate of Origin (DCO) sign-offs on commits.
#
# Notes:
#   - Currently disabled for automatic enforcement.
#   - Can be run manually with workflow_dispatch.
#   - Enable the pull_request trigger when the project is ready to require
#     DCO sign-offs from contributors.
#
# TODO:
#   - Add DCO guidance to CONTRIBUTING.md before enabling enforcement.
#   - Enable pull_request triggers when external contribution policy is ready.
#
# Related:
#   - https://developercertificate.org/
#
# =============================================================================

name: "⚖️ DCO"

on:
  workflow_dispatch:

  # TODO: Enable when ready to enforce DCO sign-offs.
  #
  # pull_request:
  #   types:
  #     - opened
  #     - synchronize
  #     - reopened

permissions: {}

concurrency:
  group: dco-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: "⚖️ Check DCO Sign-Offs"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "⚖️ Check DCO sign-offs"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          DCO_DOC: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/CONTRIBUTING.md#dco-sign-off
        run: |
          set -euo pipefail

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          commits="$(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")"

          if [ -z "${commits}" ]; then
            printf "No non-merge commits to check.\n" | tee --append "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          pass=0
          skip=0
          fail=0
          failures=""

          for sha in ${commits}; do
            IFS=$'\x1f' read -r -d "" short author_name author_email subject body \
              < <(git show --quiet --format="%h%x1f%an%x1f%ae%x1f%s%x1f%B" "${sha}") || true

            case "${author_name}|${author_email}" in
              *"[bot]|"* | *"[bot]@users.noreply.github.com")
                skip=$((skip + 1))
                printf "skip (bot): %s %s\n" "${short}" "${subject}"
                continue
                ;;
            esac

            expected="${author_name} <${author_email}>"
            matched=0
            present=0

            while IFS= read -r line; do
              [ -z "${line}" ] && continue

              present=1
              value="${line#*:}"
              value="${value# }"

              if [ "${value}" = "${expected}" ]; then
                matched=1
              fi
            done < <(printf "%s\n" "${body}" | grep --ignore-case "^[[:space:]]*Signed-off-by:[[:space:]]" || true)

            if [ "${matched}" -eq 1 ]; then
              pass=$((pass + 1))
              printf "ok: %s %s\n" "${short}" "${subject}"
            else
              fail=$((fail + 1))

              if [ "${present}" -eq 1 ]; then
                reason="sign-off present but does not match author (${expected})"
              else
                reason="missing Signed-off-by for ${expected}"
              fi

              printf "::error::%s %s — %s\n" "${short}" "${subject}" "${reason}"
              failures="${failures}- \`${short}\` ${subject} — ${reason}"$'\n'
            fi
          done

          {
            printf "## ⚖️ DCO Sign-Off Check\n\n"
            printf "Verifies every non-merge human-authored commit carries a \`Signed-off-by\` line matching its author.\n\n"
            printf "DCO documentation: %s\n\n" "${DCO_DOC}"
            printf "Passed: %s · Skipped bots: %s · Failed: %s\n" "${pass}" "${skip}" "${fail}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${fail}" -gt 0 ]; then
            {
              printf "\n### Commits missing a valid sign-off\n\n"
              printf "%s" "${failures}"
              printf "\nEvery commit must carry a \`Signed-off-by\` line matching its author.\n\n"
              printf "To fix the latest commit:\n\n"
              printf "> \`\`\`bash\n"
              printf "> git commit --amend --signoff --no-edit\n"
              printf "> git push --force-with-lease\n"
              printf "> \`\`\`\n\n"
              printf "To sign off several commits in this PR range:\n\n"
              printf "> \`\`\`bash\n"
              printf "> git rebase --signoff %s\n" "${BASE_SHA}"
              printf "> git push --force-with-lease\n"
              printf "> \`\`\`\n"
            } >> "${GITHUB_STEP_SUMMARY}"

            exit 1
          fi
