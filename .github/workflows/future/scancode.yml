---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# =============================================================================
# Scancode Toolkit
# =============================================================================
#
# Status:
#   Future Governance Enhancement
#
# Purpose:
#   Discover licenses, copyright notices, package metadata, and
#   attribution information within the repository.
#
# Notes:
#   - Complements REUSE compliance.
#   - Complements ClearlyDefined metadata audits.
#   - Complements SBOM generation.
#   - Useful for open-source governance and license audits.
#
# References:
#   - https://scancode-toolkit.readthedocs.io/
#   - https://github.com/aboutcode-org/scancode-toolkit
#
# Future Integrations:
#   - License Compliance
#   - SBOM Enrichment
#   - ClearlyDefined
#   - REUSE Compliance
#
# TODO:
#   - Determine desired license policy.
#   - Evaluate SPDX export requirements.
#   - Evaluate CycloneDX integration.
#   - Decide whether future violations should fail builds.
#
# =============================================================================

name: "📜 Scancode Toolkit"

on:
  workflow_dispatch:

  # TODO: Enable recurring governance audits.
  #
  # schedule:
  #   - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: scancode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: "📜 License and Attribution Audit"
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: "📦 Install Scancode Toolkit"
        run: |
          python -m pip install --upgrade pip
          pip install scancode-toolkit

      - name: "📁 Prepare reports directory"
        run: |
          mkdir -p reports

      - name: "📜 Scan repository"
        run: |
          scancode \
            --license \
            --copyright \
            --package \
            --summary \
            --json reports/scancode.json \
            .

      - name: "📦 Upload report artifact"
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: scancode-report
          path: reports/scancode.json
          retention-days: 30
          if-no-files-found: error

      - name: "📊 Summary"
        if: always()
        run: |
          {
            printf "## 📜 Scancode Toolkit\n\n"
            printf "Purpose:\n\n"
            printf "- License discovery\n"
            printf "- Copyright discovery\n"
            printf "- Package metadata discovery\n"
            printf "- Attribution auditing\n\n"
            printf "Current status:\n\n"
            printf "- Manual execution only.\n"
            printf "- Not yet enforced.\n"
            printf "- Not yet scheduled.\n\n"
            printf "Artifact:\n\n"
            printf "- \`scancode-report\`\n\n"
            printf "Future integrations:\n\n"
            printf "- REUSE Compliance\n"
            printf "- ClearlyDefined\n"
            printf "- SBOM Generation\n"
            printf "- License Governance\n"
          } >> "${GITHUB_STEP_SUMMARY}"