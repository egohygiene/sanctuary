# =============================================================================
# Ego Hygiene — Shared CI Environment Setup
# =============================================================================
#
# Location:
#   .github/actions/setup-environment/action.yml
#
# Purpose
# -------
# This composite GitHub Action prepares a repository for CI execution.
# It standardizes the environment used across all workflows in Ego Hygiene
# repositories.
#
# Responsibilities
# ----------------
# • Configure SSH for accessing private AI submodules
# • Checkout the repository with submodules
# • Setup Node.js (latest LTS)
# • Enable pnpm using Corepack
# • Install Node dependencies using pnpm
# • Setup Flutter (when .fvmrc exists)
# • Install Flutter dependencies (when pubspec.yaml exists)
# • Verify installed toolchains for debugging
#
# Design Notes
# ------------
# - This action intentionally detects project features automatically
#   (Node / Flutter) so it can be reused across many repository types.
#
# - pnpm is used instead of npm because it:
#     • installs significantly faster
#     • uses content-addressable storage
#     • improves CI caching performance
#
# - Corepack is used to manage pnpm versions consistently.
#
# =============================================================================

name: Setup Environment
description: Shared CI environment setup for Ego Hygiene repositories

runs:
  using: composite
  steps:
    # -----------------------------------------------------------------------
    # Setup Node.js
    # -----------------------------------------------------------------------
    - name: Setup Node.js
      if: ${{ hashFiles('package.json') != '' }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ".nvmrc"
        cache: npm

    # -----------------------------------------------------------------------
    # Install pnpm via Corepack (no node20 JS action dependency)
    # -----------------------------------------------------------------------
    - name: Install pnpm
      if: ${{ hashFiles('package.json') != '' }}
      shell: bash
      run: |
        corepack enable pnpm
        corepack prepare pnpm@latest --activate
        pnpm --version

    # -----------------------------------------------------------------------
    # Install Node dependencies
    # -----------------------------------------------------------------------
    - name: Install Node dependencies
      if: ${{ hashFiles('package.json') != '' }}
      shell: bash
      run: |
        if [ -f pnpm-lock.yaml ]; then
          pnpm install --frozen-lockfile --prefer-offline
        else
          pnpm install
        fi

    # -----------------------------------------------------------------------
    # Setup Flutter
    # -----------------------------------------------------------------------
    - name: Setup Flutter
      id: flutter-action
      if: ${{ hashFiles('pubspec.yaml') != '' }}
      uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
      with:
        channel: stable
        flutter-version: 3.41.0
        cache: true

    # -----------------------------------------------------------------------
    # Configure git safe.directory
    # -----------------------------------------------------------------------
    - name: Configure git safe.directory for Flutter
      if: ${{ hashFiles('pubspec.yaml') != '' }}
      shell: bash
      run: |
        git config --global --add safe.directory "${{ steps.flutter-action.outputs['CACHE-PATH'] }}"

    # -----------------------------------------------------------------------
    # Install Flutter dependencies
    # -----------------------------------------------------------------------
    - name: Install Flutter dependencies
      if: ${{ hashFiles('pubspec.yaml') != '' }}
      shell: bash
      run: flutter pub get
