---
# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "🧠 Generate Repository Intelligence"

description: "Generate repository structure and visualization artifacts under docs/generated/."

inputs:
  output-root:
    description: "Repository-relative output directory for generated artifacts."
    required: false
    default: "docs/generated"
  max-depth:
    description: "Maximum directory depth to render for generated outputs."
    required: false
    default: "10"
  excluded-paths:
    description: "Comma-separated repository-relative paths to exclude from generated outputs."
    required: false
    default: ".git,docs/generated,node_modules,dist,build,coverage,__pycache__,site"

runs:
  using: "composite"

  steps:
    - name: "📁 Prepare output directories"
      shell: bash
      run: |
        mkdir -p "${{ github.workspace }}/${{ inputs.output-root }}/tree"
        mkdir -p "${{ github.workspace }}/${{ inputs.output-root }}/visualization"

    - name: "🌳 Generate repository tree"
      shell: bash
      run: |
        python3 "${{ github.action_path }}/generate_repository_intelligence.py" \
          --repo-root "${{ github.workspace }}" \
          --output-root "${{ github.workspace }}/${{ inputs.output-root }}" \
          --max-depth "${{ inputs.max-depth }}" \
          --excluded-paths "${{ inputs.excluded-paths }}"

    - name: "🗺️ Generate repository visualization"
      uses: githubocto/repo-visualizer@0.9.1
      with:
        output_file: "${{ inputs.output-root }}/visualization/repository.svg"
        excluded_paths: "${{ inputs.excluded-paths }}"
        max_depth: "${{ inputs.max-depth }}"
        should_push: false
