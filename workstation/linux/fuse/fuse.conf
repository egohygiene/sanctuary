# ------------------------------------------------------------------------------
# FUSE Configuration
# ------------------------------------------------------------------------------
#
# Purpose:
#   Allow non-root users to create FUSE mounts that can be accessed by
#   other users via the allow_other mount option.
#
# Useful for:
#   - sshfs
#   - rclone
#   - mergerfs
#   - vmhgfs-fuse
#   - Other FUSE-based filesystems
#
# ------------------------------------------------------------------------------

user_allow_other

# ------------------------------------------------------------------------------
# Optional Limits
# ------------------------------------------------------------------------------

# Maximum number of FUSE mounts.
#
# mount_max = 1000
