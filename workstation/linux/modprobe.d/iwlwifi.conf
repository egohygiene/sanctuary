# ------------------------------------------------------------------------------
# Intel Wireless Driver Cleanup
# ------------------------------------------------------------------------------
#
# Purpose:
#   Ensure Intel wireless modules unload in the correct order.
#
# Modules:
#   - iwlwifi
#   - iwlmvm
#   - iwldvm
#   - mac80211
#
# Useful for:
#   - Driver troubleshooting
#   - Module reload workflows
#   - Wireless debugging
#
# ------------------------------------------------------------------------------

remove iwlwifi \
(/sbin/lsmod | grep -o -e ^iwlmvm -e ^iwldvm -e ^iwlwifi | xargs /sbin/rmmod) \
&& /sbin/modprobe -r mac80211
