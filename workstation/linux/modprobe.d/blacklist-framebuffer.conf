# ------------------------------------------------------------------------------
# Legacy Framebuffer Driver Blacklist
# ------------------------------------------------------------------------------
#
# Purpose:
#   Prevent legacy framebuffer drivers from loading automatically.
#
# Rationale:
#   Modern Linux systems generally use:
#
#   - amdgpu
#   - i915
#   - nouveau
#   - proprietary NVIDIA drivers
#
# Legacy framebuffer drivers can interfere with:
#
#   - Suspend / resume
#   - KMS (Kernel Mode Setting)
#   - DRM
#   - Modern graphics drivers
#
# Preserve as a workstation hardening and compatibility baseline.
#
# ------------------------------------------------------------------------------

blacklist aty128fb
blacklist atyfb
blacklist radeonfb
blacklist cirrusfb
blacklist cyber2000fb
blacklist cyblafb
blacklist gx1fb
blacklist hgafb
blacklist i810fb
blacklist intelfb
blacklist kyrofb
blacklist lxfb
blacklist matroxfb_base
blacklist neofb
blacklist nvidiafb
blacklist pm2fb
blacklist rivafb
blacklist s1d13xxxfb
blacklist savagefb
blacklist sisfb
blacklist sstfb
blacklist tdfxfb
blacklist tridentfb
blacklist vfb
blacklist viafb
blacklist vt8623fb
blacklist udlfb

# Optional:
#
# blacklist vesafb
