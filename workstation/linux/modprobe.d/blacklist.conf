# ------------------------------------------------------------------------------
# Generic Kernel Module Blacklist
# ------------------------------------------------------------------------------
#
# Purpose:
#   Prevent legacy, debug, or undesirable modules from loading
#   automatically.
#
# Notes:
#   Some entries remain for historical reference and may no longer be
#   relevant on modern systems.
#
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Debug Modules
# ------------------------------------------------------------------------------

blacklist evbug

# ------------------------------------------------------------------------------
# Legacy Input Drivers
# ------------------------------------------------------------------------------

blacklist usbmouse
blacklist usbkbd

# ------------------------------------------------------------------------------
# Audio
# ------------------------------------------------------------------------------

blacklist snd_intel8x0m
blacklist snd_aw2

# Disable PC speaker support.
blacklist snd_pcsp
blacklist pcspkr

# ------------------------------------------------------------------------------
# Historical Compatibility Entries
# ------------------------------------------------------------------------------

# Legacy network drivers.
blacklist eepro100
blacklist de4x5

# Legacy wireless drivers.
blacklist prism54
blacklist bcm43xx

# Legacy ASUS driver.
blacklist asus_acpi

# Historical Garmin GPS workaround.
blacklist garmin_gps

# Historical FireWire networking.
blacklist eth1394

# Historical AMD EDAC conflict workaround.
blacklist amd76x_edac
