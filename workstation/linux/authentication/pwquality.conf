# ------------------------------------------------------------------------------
# Password Quality Policy
# ------------------------------------------------------------------------------
#
# Purpose:
#   Balanced password policy suitable for:
#
#   - Workstations
#   - Servers
#   - Development environments
#
# Goals:
#
#   - Encourage long passwords.
#   - Prevent trivial passwords.
#   - Prevent dictionary passwords.
#   - Avoid excessive complexity requirements.
#
# Reference:
#   libpwquality
#
# ------------------------------------------------------------------------------

# cspell:ignore minlen pwquality libpwquality minclass maxrepeat maxclassrepeat
# cspell:ignore dcredit ucredit lcredit ocredit dictcheck gecoscheck difok

# ------------------------------------------------------------------------------
# Password Composition
# ------------------------------------------------------------------------------

# Minimum password length.
minlen = 12

# Require 3 of 4 character classes:
#   - lowercase
#   - uppercase
#   - digits
#   - special characters
minclass = 3

# Prevent excessive repeated characters.
maxrepeat = 3

# Prevent excessive reuse of the same character class.
maxclassrepeat = 3

# ------------------------------------------------------------------------------
# Character Class Credits
# ------------------------------------------------------------------------------

# Do not reduce required length based on character classes.

dcredit = 0
ucredit = 0
lcredit = 0
ocredit = 0

# ------------------------------------------------------------------------------
# Quality Checks
# ------------------------------------------------------------------------------

# Check against dictionary words.
dictcheck = 1

# Prevent use of account information.
gecoscheck = 1

# Require sufficient difference from previous password.
difok = 5

# ------------------------------------------------------------------------------
# Enforcement
# ------------------------------------------------------------------------------

# Enforce policy rather than only warning.
enforcing = 1

# Allow three attempts.
retry = 3
