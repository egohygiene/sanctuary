# ------------------------------------------------------------------------------
# NVIDIA S0ix Power Management
# ------------------------------------------------------------------------------
#
# Purpose:
#   Enable NVIDIA support for S0ix (Modern Standby).
#
# Useful for:
#   - Laptops
#   - Mobile workstations
#   - Hybrid graphics systems
#
# Benefits:
#   - Improved suspend / resume behavior
#   - Reduced standby power consumption
#   - Better battery life
#
# ------------------------------------------------------------------------------

options nvidia \
    NVreg_EnableS0ixPowerManagement=1 \
    NVreg_S0ixPowerManagementVideoMemoryThreshold=10000
