# ------------------------------------------------------------------------------
# NVIDIA DRM Kernel Mode Setting
# ------------------------------------------------------------------------------
#
# Purpose:
#   Enable DRM Kernel Mode Setting (KMS) for the NVIDIA driver.
#
# Benefits:
#   - Wayland compatibility
#   - Improved multi-monitor support
#   - Better suspend / resume behavior
#   - Modern Linux graphics stack compatibility
#
# Reference:
#   NVIDIA DRM driver parameter
#
# ------------------------------------------------------------------------------

options nvidia-drm modeset=1
