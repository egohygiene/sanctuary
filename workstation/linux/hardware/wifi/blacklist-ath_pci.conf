# ------------------------------------------------------------------------------
# Legacy Atheros Driver Blacklist
# ------------------------------------------------------------------------------
#
# Purpose:
#   Prevent the legacy MadWifi ath_pci driver from loading.
#
# Historical Context:
#   Some Atheros 5K devices could be left in an unrecoverable state when
#   initialized by ath_pci, preventing ath5k from functioning correctly.
#
# Reference:
#   Ubuntu bug reports:
#   - #315056
#   - #323830
#
# Preserve for historical reference and troubleshooting.
#
# ------------------------------------------------------------------------------

blacklist ath_pci
