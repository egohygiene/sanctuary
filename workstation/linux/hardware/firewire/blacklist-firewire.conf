# ------------------------------------------------------------------------------
# Legacy FireWire Driver Blacklist
# ------------------------------------------------------------------------------
#
# Purpose:
#   Disable the legacy IEEE1394 driver stack.
#
# Historical Context:
#   Linux previously shipped both:
#
#   - ieee1394 (legacy)
#   - firewire (modern)
#
# This configuration prevented the legacy stack from loading.
#
# Preserve for historical reference and troubleshooting.
#
# ------------------------------------------------------------------------------

blacklist ohci1394
blacklist sbp2
blacklist dv1394
blacklist raw1394
blacklist video1394

# Optional:
#
# Disable the newer FireWire stack instead.
#
# blacklist firewire-ohci
# blacklist firewire-sbp2
