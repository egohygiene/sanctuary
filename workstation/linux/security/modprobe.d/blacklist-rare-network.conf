# ------------------------------------------------------------------------------
# Rare Network Protocol Blacklist
# ------------------------------------------------------------------------------
#
# Purpose:
#   Reduce kernel attack surface by disabling uncommon networking protocols.
#
# Rationale:
#   These protocols are rarely used on modern systems and have historically
#   received less security scrutiny than mainstream networking stacks.
#
# If a protocol is required, remove the corresponding entry or load the
# module explicitly.
#
# ------------------------------------------------------------------------------

# AX.25 Amateur Radio
alias net-pf-3 off

# NET/ROM Amateur Radio
alias net-pf-6 off

# X.25
alias net-pf-9 off

# ROSE Amateur Radio
alias net-pf-11 off

# DECnet
alias net-pf-12 off

# Econet
alias net-pf-19 off

# RDS
alias net-pf-21 off

# IEEE 802.15.4
alias net-pf-36 off
