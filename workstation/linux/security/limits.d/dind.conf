# ------------------------------------------------------------------------------
# Resource Limits
# ------------------------------------------------------------------------------
#
# Purpose:
#   Resource limits suitable for:
#
#   - Docker
#   - Podman
#   - Dev Containers
#   - CI runners
#   - Build systems
#   - Container orchestration tooling
#
# Notes:
#   These values are intentionally more permissive than typical workstation
#   defaults to support development workflows.
#
# cspell:ignore fsize
#
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Open Files
# ------------------------------------------------------------------------------

# Increase available file descriptors.

* soft nofile 65536
* hard nofile 1048576

# ------------------------------------------------------------------------------
# Processes
# ------------------------------------------------------------------------------

# Allow large builds, containers, and orchestration workloads.

* soft nproc 8192
* hard nproc 65536

# ------------------------------------------------------------------------------
# Core Dumps
# ------------------------------------------------------------------------------

# Disable core dumps by default.

* soft core 0
* hard core 0

# ------------------------------------------------------------------------------
# File Size
# ------------------------------------------------------------------------------

# Maximum file size (2 GiB).

* soft fsize 2097152
* hard fsize 2097152

# ------------------------------------------------------------------------------
# Memory Locking
# ------------------------------------------------------------------------------

# Increase only if CAP_IPC_LOCK workloads are required.

* soft memlock 64
* hard memlock 64

# ------------------------------------------------------------------------------
# Scheduling
# ------------------------------------------------------------------------------

# Neutral scheduling priority.

* soft nice 0
* hard nice 0

# ------------------------------------------------------------------------------
# Address Space
# ------------------------------------------------------------------------------

# Leave unrestricted unless resource constraints are required.

* - as unlimited
