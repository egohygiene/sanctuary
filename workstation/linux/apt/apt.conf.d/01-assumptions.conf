# ------------------------------------------------------------------------------
# Automation Defaults
# ------------------------------------------------------------------------------

# These options are useful in:
#
# - CI pipelines
# - Containers
# - Automated provisioning
#
# They are intentionally disabled for workstation use.

# Assume "yes" for all prompts.
#
# APT::Get::Assume-Yes "1";

# Download packages without installing them.
#
# APT::Get::Download-Only "0";

# Configure packages immediately when possible.
#
# APT::Immediate-Configure "1";

# Allow loop breaking.
#
# APT::Force-LoopBreak "0";
