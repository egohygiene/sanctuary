# ------------------------------------------------------------------------------
# Package Acquisition
# ------------------------------------------------------------------------------

# Use incremental package index updates.
Acquire::PDiffs "1";

# Improve repository consistency.
Acquire::By-Hash "1";

# Retry failed downloads.
Acquire::Retries "3";

# Allow source symlinks.
Acquire::Source-Symlinks "1";

# Validate repository metadata dates.
Acquire::Check-Valid-Until "1";
Acquire::Check-Date "1";

# Allow limited clock skew.
Acquire::Max-FutureTime "86400";

# Skip translation files.
Acquire::Languages "none";

# Use compressed indexes.
Acquire::GzipIndexes "1";

# Queue downloads by host.
Acquire::Queue-Mode "host";

# ------------------------------------------------------------------------------
# Legacy / Historical Settings
# ------------------------------------------------------------------------------

# Modern APT versions already expect TLS support.
#
# Acquire::AllowTLS "1";

# APT generally chooses optimal compression automatically.
#
# Acquire::CompressionTypes::Order "gz";
