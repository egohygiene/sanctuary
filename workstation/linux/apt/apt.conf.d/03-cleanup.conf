# ------------------------------------------------------------------------------
# Cache Cleanup
# ------------------------------------------------------------------------------

# Remove installed package archives when possible.

APT::Clean-Installed "1";

# Disable binary package caches.
Dir::Cache::pkgcache "";
Dir::Cache::srcpkgcache "";

