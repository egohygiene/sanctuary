# ------------------------------------------------------------------------------
# Linux Kernel Hardening Baseline
# ------------------------------------------------------------------------------
#
# Purpose:
#   Security-focused baseline suitable for:
#
#   - Workstations
#   - Servers
#   - Containers
#   - DevContainers
#   - CI images
#
# References:
#   - CIS Linux Benchmark
#   - Lynis Recommendations
#   - konstruktoid/hardening
#
# Notes:
#   Settings commented out below are useful in some environments but may
#   interfere with development workflows.
#
# ------------------------------------------------------------------------------

# cspell:ignore dmesg kptr syncookies ptrace redir martians

# ------------------------------------------------------------------------------
# Kernel Information Exposure
# ------------------------------------------------------------------------------

# Restrict dmesg access.
kernel.dmesg_restrict = 1

# Hide kernel pointers from non-privileged users.
kernel.kptr_restrict = 1

# ------------------------------------------------------------------------------
# Memory & Process Hardening
# ------------------------------------------------------------------------------

# Full ASLR.
kernel.randomize_va_space = 2

# Disable SUID core dumps.
fs.suid_dumpable = 0

# Restrict ptrace to parent processes.
#
# Useful hardening setting that generally does not break development tools.
kernel.yama.ptrace_scope = 1

# ------------------------------------------------------------------------------
# IPv4 Network Hardening
# ------------------------------------------------------------------------------

# Enable SYN flood protection.
net.ipv4.tcp_syncookies = 1

# Ignore ICMP broadcast requests.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP errors.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Enable reverse-path filtering.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable source-routed packets.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Disable ICMP redirects.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Disable secure redirects.
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Do not send ICMP redirects.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log suspicious packets.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ------------------------------------------------------------------------------
# IPv6 Hardening
# ------------------------------------------------------------------------------

# Disable router advertisements.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# Disable ICMP redirects.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# ------------------------------------------------------------------------------
# Optional Hardening
# ------------------------------------------------------------------------------

# Uncomment for systems that do not require unprivileged BPF.
#
# kernel.unprivileged_bpf_disabled = 1

# Uncomment for systems that do not require user namespaces.
#
# user.max_user_namespaces = 0

# Uncomment for hardened servers.
# May break containers, rootless Docker, Podman, and sandboxed applications.
#
# kernel.unprivileged_userns_clone = 0

# Uncomment to disable magic SysRq.
#
# kernel.sysrq = 0

# Uncomment for dedicated servers.
# Can interfere with debugging and profiling tools.
#
# kernel.perf_event_paranoid = 3

# Uncomment for high-security environments.
# Can break profiling and observability tooling.
#
# kernel.kptr_restrict = 2
