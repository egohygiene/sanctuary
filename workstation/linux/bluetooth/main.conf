[General]

# Automatically enable Bluetooth adapters when detected.
AutoEnable=true

# Restrict controller mode.
#
# Options:
#   dual
#   bredr
#   le
#
# Uncomment if Classic Bluetooth-only operation is desired.
#
# ControllerMode=bredr
