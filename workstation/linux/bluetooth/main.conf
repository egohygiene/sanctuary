# ------------------------------------------------------------------------------
# BlueZ Configuration Overrides
# ------------------------------------------------------------------------------
#
# Purpose:
#   Sanctuary workstation Bluetooth baseline.
#
# Notes:
#   These settings supplement distribution defaults.
#
