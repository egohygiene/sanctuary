<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">

<!--
===============================================================================
Google / Custom Font Preferences
===============================================================================

Purpose:
    Define preferred font families when bundled fonts are installed.

Notes:
    - Safe to use even if some fonts are not installed.
    - Fontconfig automatically skips missing fonts.
    - Prioritizes developer-friendly fonts and broad Unicode support.

===============================================================================
-->

<fontconfig>

    <!-- ===================================================================== -->
    <!-- Sans Serif                                                            -->
    <!-- ===================================================================== -->

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Inter</family>
            <family>Noto Sans</family>
            <family>Roboto</family>
            <family>Ubuntu</family>
            <family>DejaVu Sans</family>
        </prefer>
    </alias>

    <!-- ===================================================================== -->
    <!-- Serif                                                                 -->
    <!-- ===================================================================== -->

    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif</family>
            <family>Roboto Serif</family>
            <family>DejaVu Serif</family>
        </prefer>
    </alias>

    <!-- ===================================================================== -->
    <!-- Monospace                                                             -->
    <!-- ===================================================================== -->

    <alias>
        <family>monospace</family>
        <prefer>
            <family>JetBrainsMono Nerd Font</family>
            <family>FiraCode Nerd Font</family>
            <family>JetBrains Mono</family>
            <family>Fira Code</family>
            <family>Noto Sans Mono</family>
            <family>Ubuntu Mono</family>
            <family>DejaVu Sans Mono</family>
        </prefer>
    </alias>

    <!-- ===================================================================== -->
    <!-- Emoji                                                                 -->
    <!-- ===================================================================== -->

    <alias>
        <family>emoji</family>
        <prefer>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

</fontconfig>
