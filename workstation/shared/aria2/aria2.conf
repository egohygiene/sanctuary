# ------------------------------------------------------------------------------
# aria2 Configuration
# ------------------------------------------------------------------------------
#
# Purpose:
#   User configuration for the aria2 download utility.
#
# This file intentionally contains only portable defaults.
#
# Documentation:
#   https://aria2.github.io/manual/en/html/aria2c.html
#
# ------------------------------------------------------------------------------

# Continue interrupted downloads.
continue=true

# Automatically rename conflicting files.
auto-file-renaming=true

# Allow downloading from multiple sources.
split=8
max-connection-per-server=8

# Enable resumable downloads.
always-resume=true

# Store session state.
save-session=${HOME}/.config/aria2/aria2.session
input-file=${HOME}/.config/aria2/aria2.session
save-session-interval=60

# ------------------------------------------------------------------------------
# Optional Settings
# ------------------------------------------------------------------------------

# dir=/path/to/downloads
# file-allocation=falloc
# check-certificate=true
# enable-rpc=true
# rpc-listen-all=false
# rpc-secret=<secret>
