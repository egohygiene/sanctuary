###############################################################################
# pip Configuration
###############################################################################
#
# Purpose:
#   Portable pip defaults for the Sanctuary developer platform.
#
# Philosophy:
#   - Secure by default
#   - Respect XDG where practical
#   - Deterministic behavior
#   - Keep configuration minimal
#
# Documentation:
#   https://pip.pypa.io/
#
###############################################################################

[global]

# Prefer cached packages when available.
cache-dir = ~/.cache/pip

# Disable version check during every invocation.
disable-pip-version-check = true

# Improve terminal output.
progress-bar = on

# Default network timeout (seconds).
timeout = 30

###############################################################################
# Optional Settings
###############################################################################

# Extra package indexes.
# extra-index-url =

# Corporate mirrors.
# index-url =

# Trusted hosts (NOT recommended unless required).
#
# trusted-host =
#     internal.example.com

# Use a keyring provider.
# keyring-provider = auto

