---
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible-lint-config.json
# .ansible-lint

# ==============================================================================
# .ansible-lint.yml
# ------------------------------------------------------------------------------
# Ego Hygiene — Universal Ansible Lint Configuration
#
# @description
# A verbose, explicit, and portable baseline configuration for ansible-lint.
# Designed to:
# - Work consistently across repositories
# - Integrate cleanly with MegaLinter
# - Favor correctness over suppression
# - Minimize hidden behavior
#
# @philosophy
# - Prefer explicit defaults over implicit behavior
# - Avoid skipping rules unless justified
# - Keep configuration readable and self-documented
# ==============================================================================

# ------------------------------------------------------------------------------
# Core Behavior
# ------------------------------------------------------------------------------

# Display file paths relative to project root
display_relative_path: true

# Enable default rule set
use_default_rules: true

# Optional profile (leave null for full rule coverage)
profile: null

# Run in strict mode (fail on warnings)
strict: false

# Reduce noise in CLI output (MegaLinter handles formatting anyway)
quiet: true

# Verbosity level (0 = minimal, increase for debugging)
verbosity: 0

# ------------------------------------------------------------------------------
# Execution Environment
# ------------------------------------------------------------------------------

# Run in offline mode (prevents network calls)
offline: false

# Project root (auto-detected if null)
project_dir: null

# Additional variables injected during linting
extra_vars: {}

# ------------------------------------------------------------------------------
# Rule Control
# ------------------------------------------------------------------------------

# Explicitly enabled rules (empty = all default rules)
enable_list: []

# Rules to skip (keep minimal; prefer fixing code instead)
skip_list: []

# Rules that should emit warnings instead of errors
warn_list: []

# Tag-based filtering (empty = all rules)
tags: []

# ------------------------------------------------------------------------------
# Rule-Specific Configuration
# ------------------------------------------------------------------------------

rules: {}

# Example structure (kept for reference, not active):
# rules:
#   fqcn:
#     exclude_paths:
#       - "legacy/**"

# ------------------------------------------------------------------------------
# File & Path Handling
# ------------------------------------------------------------------------------

exclude_paths:
    - __pycache__/
    - .cache/
    - .git/
    - .history/
    - .idea/
    - .mypy_cache/
    - .next/
    - .nuxt/
    - .output/
    - .pytest_cache/
    - .ruff_cache/
    - .venv/
    - .vercel/
    - ".github/"
    - "**/.megalinter.yml"
    - "**/taskfile.yaml"
    - "**/Taskfile.yaml"
    - "**/taskfile.yml"
    - "**/Taskfile.yml"
    - build/
    - config/
    - coverage/
    - dist/
    - docs/
    - lint/
    - logs/
    - node_modules/
    - package-lock.json
    - pnpm-lock.yaml
    - reports/
    - tasks/
    - venv/
    - yarn.lock

# ------------------------------------------------------------------------------
# Ansible Behavior Customization
# ------------------------------------------------------------------------------

# Maximum nested block depth
max_block_depth: 20

# Variable naming pattern (enforces snake_case)
var_naming_pattern: "^[a-z_][a-z0-9_]*$"

# Task name prefix format
task_name_prefix: "{stem} | "

# Loop variable naming enforcement
# (uncomment if enforcing strict loop naming conventions)
# loop_var_prefix: "item_"

# ------------------------------------------------------------------------------
# Builtins Enforcement
# ------------------------------------------------------------------------------

# Allow specific collections when enforcing only-builtins
only_builtins_allow_collections: []

# Allow specific modules when enforcing only-builtins
only_builtins_allow_modules: []

# ------------------------------------------------------------------------------
# Mocking (for CI environments)
# ------------------------------------------------------------------------------

# Mock modules that may not exist in CI
mock_modules: []

# Mock roles that may not exist in CI
mock_roles: []

# ------------------------------------------------------------------------------
# File Type Detection
# ------------------------------------------------------------------------------

# Custom file kind mappings (rarely needed)
kinds: []

# ------------------------------------------------------------------------------
# Output Configuration
# ------------------------------------------------------------------------------

# SARIF output file (used in GitHub code scanning)
sarif_file: null

# ------------------------------------------------------------------------------
# Write / Autofix Behavior
# ------------------------------------------------------------------------------

# Rules allowed to modify files
write_list: []

# Rules excluded from modifying files
write_exclude_list: []

# ------------------------------------------------------------------------------
# Advanced / Rarely Used
# ------------------------------------------------------------------------------

# Additional custom rule directories
rulesdir: []

# Skip validation of module arguments (not recommended globally)
skip_action_validation: false

# Additional supported Ansible versions
supported_ansible_also: []

# ------------------------------------------------------------------------------
# ⚠️ Deprecated / Removed Features
# ------------------------------------------------------------------------------

# progressive: false  # Removed feature — do not use
